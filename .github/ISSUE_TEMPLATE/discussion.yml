name: 🔍 Discussion
description: Architectural proposals or RFCs for gathering feedback.
labels: ["discussion"]
body:
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: What are you proposing?
    validations:
      required: true
  - type: textarea
    id: motivation
    attributes:
      label: Motivation
      description: Why is this change needed?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: What other approaches did you consider?
  - type: textarea
    id: impact
    attributes:
      label: Impact
      description: What are the implications of this change?
