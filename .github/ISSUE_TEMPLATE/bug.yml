name: 🐛 Bug
description: Report a defect or error.
labels: ["bug"]
body:
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Detailed steps to reproduce the issue
      placeholder: "1. Open app...\n2. Click on...\n3. Observe..."
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What should happen?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happens?
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Rust version, relevant dependencies
      placeholder: "OS: macOS 14.0\nRust: 1.75.0\nINDIGO: 2.0.300"
  - type: textarea
    id: logs
    attributes:
      label: Logs / Error Messages
      description: Any relevant error messages or stack traces
      render: shell
