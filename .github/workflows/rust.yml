name: Rust

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

env:
  CARGO_TERM_COLOR: always

jobs:
  # Test pure Rust strategy (no C dependencies)
  test-rs-strategy:
    name: Test Pure Rust Strategy
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: "recursive"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libavahi-client-dev \
            build-essential \
            cmake \
            libudev-dev \
            libavahi-compat-libdnssd-dev \
            libusb-1.0-0-dev \
            libcurl4-gnutls-dev \
            libz-dev

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - name: Cache INDIGO build
        uses: actions/cache@v3
        with:
          path: |
            sys/externals/indigo/build
          key: ${{ runner.os }}-indigo-rs-${{ hashFiles('sys/externals/indigo/**') }}
          restore-keys: |
            ${{ runner.os }}-indigo-rs-

      - name: Check formatting
        run: cargo fmt --all -- --check
        continue-on-error: true

      - name: Run clippy
        run: cargo clippy --no-default-features --features rs-strategy -- -D warnings
        continue-on-error: true

      - name: Build with rs-strategy (runtime only)
        run: cargo build --no-default-features --features rs-strategy --verbose

      - name: Run unit tests (rs-strategy)
        run: cargo test --no-default-features --features rs-strategy --lib --verbose

      - name: Build INDIGO server for integration tests
        run: |
          echo "Building INDIGO server for integration tests..."
          # Build with test-server feature to compile INDIGO server (build-time only)
          cargo build --no-default-features --features "rs-strategy,test-server" --verbose

          # Verify server binary was built
          if [ -f "sys/externals/indigo/build/bin/indigo_server" ]; then
            echo "✓ INDIGO server built successfully"
            ls -lh sys/externals/indigo/build/bin/indigo_server
          else
            echo "✗ INDIGO server not found in expected location"
            echo "Searching for indigo_server..."
            find sys/externals/indigo -name "indigo_server" -type f || true
          fi

      - name: Run integration tests (rs-strategy with server)
        run: |
          echo "Running integration tests with INDIGO server..."
          # Run integration tests - they will discover the built server
          cargo test --no-default-features --features rs-strategy --test '*' --verbose
        continue-on-error: true

  # Build with FFI strategy (requires C library)
  build-ffi-strategy:
    name: Build FFI Strategy
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: "recursive"

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            autoconf \
            autotools-dev \
            libtool \
            cmake \
            libudev-dev \
            libavahi-compat-libdnssd-dev \
            libavahi-client-dev \
            libglib2.0-dev \
            libusb-1.0-0-dev \
            libcurl4-gnutls-dev \
            libgphoto2-dev \
            libz-dev \
            git \
            curl \
            patchelf

      - name: Cache INDIGO build
        uses: actions/cache@v3
        with:
          path: |
            sys/externals/indigo/build
            target
          key: ${{ runner.os }}-indigo-ffi-${{ hashFiles('sys/externals/indigo/**') }}
          restore-keys: |
            ${{ runner.os }}-indigo-ffi-

      - name: Verify submodule checkout
        run: |
          echo "Checking submodule status..."
          ls -la sys/externals/
          if [ -d "sys/externals/indigo" ]; then
            echo "INDIGO submodule exists"
            ls -la sys/externals/indigo/ | head -20
          else
            echo "ERROR: INDIGO submodule not found!"
            exit 1
          fi

      - name: Build workspace (default features with FFI)
        run: cargo build --workspace --exclude libindigo-relm --verbose
        env:
          # Build INDIGO from submodule (absolute path from workspace root)
          INDIGO_SOURCE: ${{ github.workspace }}/sys/externals/indigo

      - name: Verify INDIGO server was built
        run: |
          echo "Checking for INDIGO server binary..."
          if [ -f "sys/externals/indigo/build/bin/indigo_server" ]; then
            echo "✓ INDIGO server built successfully"
            ls -lh sys/externals/indigo/build/bin/indigo_server
          else
            echo "✗ INDIGO server not found in expected location"
            echo "Searching for indigo_server..."
            find sys/externals/indigo -name "indigo_server" -type f || true
          fi

      - name: Run unit tests (FFI strategy)
        run: cargo test --workspace --exclude libindigo-relm --lib --verbose
        continue-on-error: true

      - name: Run integration tests (FFI strategy with server)
        run: |
          echo "Running integration tests with INDIGO server..."
          # Integration tests will discover the built server
          cargo test --workspace --exclude libindigo-relm --test '*' --verbose
        continue-on-error: true

  # Minimal build check (no optional features)
  build-minimal:
    name: Build Minimal (No Optional Features)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - name: Build with no default features
        run: cargo build --no-default-features --verbose
        continue-on-error: true

  # Documentation build
  docs:
    name: Build Documentation
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: "recursive"

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - name: Build documentation
        run: cargo doc --no-deps --no-default-features --features rs-strategy --verbose
        env:
          RUSTDOCFLAGS: "-D warnings"
        continue-on-error: true

  # Check different Rust versions
  check-rust-versions:
    name: Check Rust ${{ matrix.rust }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        rust: [stable, beta, nightly]

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libavahi-client-dev

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: ${{ matrix.rust }}

      - name: Check with rs-strategy
        run: cargo check --no-default-features --features rs-strategy --verbose
        continue-on-error: ${{ matrix.rust != 'stable' }}
