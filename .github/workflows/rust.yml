name: Rust

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

env:
  CARGO_TERM_COLOR: always

jobs:
  # Test pure Rust client (no C dependencies, no C compilation)
  test-rs-client:
    name: Test Pure Rust Client
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          submodules: false

      - name: Shallow checkout INDIGO submodule (headers only, no recursive)
        run: git submodule update --init --depth 1 sys/externals/indigo

      - name: Install minimal system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libavahi-client-dev

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - name: Cache Cargo registry and build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-rs-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-rs-

      - name: Check formatting
        run: cargo fmt --all -- --check
        continue-on-error: true

      - name: Run clippy (libindigo-rs)
        run: cargo clippy -p libindigo-rs -- -D warnings
        continue-on-error: true

      - name: Build core crate (strategy-agnostic)
        run: cargo build -p libindigo --no-default-features --verbose

      - name: Build pure Rust client
        run: cargo build -p libindigo-rs --verbose

      - name: Build pure Rust client with discovery and monitoring
        run: cargo build -p libindigo-rs --features discovery,monitoring --verbose

      - name: Run unit tests (pure Rust client)
        run: cargo test -p libindigo-rs --lib --verbose

      - name: Run unit tests with discovery and monitoring
        run: cargo test -p libindigo-rs --lib --features discovery,monitoring --verbose

  # Build FFI client (requires C library)
  build-ffi-client:
    name: Build FFI Client
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          submodules: "recursive"

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            autoconf \
            autotools-dev \
            libtool \
            cmake \
            libudev-dev \
            libavahi-compat-libdnssd-dev \
            libavahi-client-dev \
            libglib2.0-dev \
            libusb-1.0-0-dev \
            libcurl4-gnutls-dev \
            libgphoto2-dev \
            libz-dev \
            git \
            curl \
            patchelf

      - name: Cache INDIGO build
        uses: actions/cache@v4
        with:
          path: |
            sys/externals/indigo/build
          key: ${{ runner.os }}-indigo-ffi-${{ hashFiles('sys/externals/indigo/Makefile') }}
          restore-keys: |
            ${{ runner.os }}-indigo-ffi-

      - name: Cache Cargo registry and build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-ffi-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-ffi-

      - name: Verify submodule checkout
        run: |
          echo "Checking submodule status..."
          ls -la sys/externals/
          if [ -d "sys/externals/indigo" ]; then
            echo "INDIGO submodule exists"
            ls -la sys/externals/indigo/ | head -20
          else
            echo "ERROR: INDIGO submodule not found!"
            exit 1
          fi

      - name: Build FFI crate (compiles INDIGO C library via libindigo-sys)
        run: cargo build -p libindigo-ffi --verbose

      - name: Verify INDIGO server was built
        run: |
          echo "Checking for INDIGO server binary..."
          if [ -f "sys/externals/indigo/build/bin/indigo_server" ]; then
            echo "✓ INDIGO server built successfully"
            ls -lh sys/externals/indigo/build/bin/indigo_server
          else
            echo "ℹ INDIGO server not found (may not be built by targeted build)"
            find sys/externals/indigo/build -name "indigo_server" -type f 2>/dev/null || echo "No server binary found"
          fi
        continue-on-error: true

      - name: Run unit tests (FFI crate)
        run: cargo test -p libindigo-ffi --lib --verbose
        continue-on-error: true

      - name: Build FFI crate with discovery and monitoring
        run: cargo build -p libindigo-ffi --features discovery,monitoring --verbose
        continue-on-error: true

  # Minimal build check (no optional features)
  build-minimal:
    name: Build Minimal (No Optional Features)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - name: Build with no default features
        run: cargo build -p libindigo --no-default-features --verbose
        continue-on-error: true

  # Documentation build
  docs:
    name: Build Documentation
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          submodules: false

      - name: Shallow checkout INDIGO submodule (headers only)
        run: git submodule update --init --depth 1 sys/externals/indigo

      - name: Install minimal system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libavahi-client-dev

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - name: Build documentation
        run: cargo doc --no-deps -p libindigo --no-default-features --verbose
        env:
          RUSTDOCFLAGS: "-D warnings"
        continue-on-error: true

  # Check different Rust versions
  check-rust-versions:
    name: Check Rust ${{ matrix.rust }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        rust: [stable, beta, nightly]

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libavahi-client-dev

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: ${{ matrix.rust }}

      - name: Check core crate (strategy-agnostic)
        run: cargo check -p libindigo --no-default-features --verbose
        continue-on-error: ${{ matrix.rust != 'stable' }}
