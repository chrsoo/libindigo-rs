[package]
name = "libindigo-sys"
description = "Rust FFI bindings for the INDIGO system library generated by bindgen."
version = "0.3.2+INDIGO.2.0.300"
license = "MIT"
repository = "https://github.com/chrsoo/libindigo-rs"
readme = "README.md"
keywords = ["astronomy", "astrophotography", "indigo", "indi", "ffi"]
categories = ["asynchronous", "external-ffi-bindings", "hardware-support"]
edition = "2021"
exclude = ["/externals/indigo/ "]

[dependencies]
# No runtime dependencies - this is a pure FFI bindings crate

[build-dependencies]
bindgen = { version = "0.71", features = ["prettyplease"] }
semver = "1.0.23"
regex = "1.11"
rev_buf_reader = "0.3.0"
